# Tomcat configuration
server:
  port: 8080

# 配置连接数据库
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource  # 使用HikariCP连接池
    url: jdbc:mysql://192.168.100.101:3306/house?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Dengqin.123
    hikari:
      connection-test-query: SELECT 1  # 用于测试连接是否有效的SQL查询
      connection-timeout: 60000  # 连接超时时间，单位毫秒
      maximum-pool-size: 12       # 连接池最大连接数
      minimum-idle: 10             # 连接池最小空闲连接数
      idle-timeout: 500000     # 连接空闲超时时间，单位毫秒
      max-lifetime: 1800000    # 连接最大生命周期，单位毫秒
      pool-name: SPHHikariPool  # 连接池名称
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss  # 全局日期格式
    time-zone: GMT+8  # 设置时区为中国标准时间
  # 配置Redis连接
  data:
    redis:
      host: 192.168.100.101
      port: 6379
      database: 0

# 配置SpringDoc OpenAPI
springdoc:
  default-flat-param-object: true  # 将复杂参数展平为简单参数，方便在Swagger UI中展示

# 配置MyBatis
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 输出SQL日志到控制台
  # 全局配置
  global-config:
    db-config:
      # 配置逻辑删除，不用在SQL中添加删除条件，MyBatis-Plus会自动处理,记得在实体类的字段中使用@TableLogic注解标记
      logic-delete-field: is_deleted  # 逻辑删除字段名
      logic-delete-value: 1  # 逻辑删除值
      logic-not-delete-value: 0  # 逻辑未删除值

# 配置minio
minio:
  endpoint: http://192.168.100.101:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: house

